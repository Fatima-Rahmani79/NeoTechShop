<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
    <title>NeoTechShop|Login, Register</title>
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <!-- Login Form -->
      <div id="loginForm" class="form-section active">
        <h2>Login</h2>
        <form id="loginFormElement" novalidate>
          <label for="loginEmail">Email: </label>
          <input type="email" id="loginEmail" placeholder="Email" required />
          <label for="loginPassword">Password: </label>
          <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
            minlength="6"
          />
          <button type="submit" class="btn">Login</button>
        </form>
        <p>Don't have an account? <a href="#" id="showRegister">Register</a></p>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="form-section">
        <h2>Create New Account</h2>
        <form id="registerFormElement" novalidate>
          <label for="regUsername">Username: </label>
          <input type="text" id="regUsername" required minlength="3" />
          <label for="regEmail">Email: </label>
          <input type="email" id="regEmail" required />
          <label for="regPassword">Password: </label>
          <input
            type="password"
            id="regPassword"
            placeholder="Password must be at least 6 characters."
            required
            minlength="6"
          />
          <button type="submit" class="btn">Register</button>
        </form>
        <p>Already have an account? <a href="#" id="showLogin">Login</a></p>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      // ==== Toggle between forms ====
      const showRegister = document.getElementById("showRegister");
      const showLogin = document.getElementById("showLogin");
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");

      showRegister.addEventListener("click", (e) => {
        e.preventDefault();
        registerForm.classList.add("active");
        loginForm.classList.remove("active");
      });

      showLogin.addEventListener("click", (e) => {
        e.preventDefault();
        loginForm.classList.add("active");
        registerForm.classList.remove("active");
      });

      // ==== Toast Function ====
      function showToast(message, duration = 3000) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => {
          toast.classList.remove("show");
        }, duration);
      }

      // ==== Register ====
      document
        .getElementById("registerFormElement")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const username = document.getElementById("regUsername").value.trim();
          const email = document.getElementById("regEmail").value.trim();
          const password = document.getElementById("regPassword").value.trim();

          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!username || !email || !password) {
            showToast("Please fill in all fields.");
            return;
          }
          if (!emailRegex.test(email)) {
            showToast("Invalid email address.");
            return;
          }
          if (password.length < 6) {
            showToast("Password must be at least 6 characters.");
            return;
          }

          localStorage.setItem(
            "user",
            JSON.stringify({ username, email, password }),
          );
          showToast("Registration successful! Please login.");
          showLogin.click();
          e.target.reset();
        });

      // ==== Login ====
      document
        .getElementById("loginFormElement")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const email = document.getElementById("loginEmail").value.trim();
          const password = document
            .getElementById("loginPassword")
            .value.trim();
          const user = JSON.parse(localStorage.getItem("user"));

          if (!email || !password) {
            showToast("Please enter email and password.");
            return;
          }

          if (user && user.email === email && user.password === password) {
            sessionStorage.setItem("loggedIn", true);
            showToast(`Welcome, ${user.username}!`);
            setTimeout(() => {
              if (sessionStorage.getItem("fromCheckout") === "true") {
                sessionStorage.removeItem("fromCheckout");
                window.location.href = "checkout.html";
              } else {
                window.location.href = "index.html";
              }
            }, 1500);
          } else {
            showToast("Invalid email or password.");
          }
        });
    </script>
  </body>
</html>
